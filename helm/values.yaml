# Global settings shared across all microservices
global:
  domain: wordwonk.fazigu.org
  # The single port for all traffic (Frontend, API, WS)
  externalPort: 80
  registry: localhost:5000
  namespace: wordwonk
  imageTag: 1.14.0
  imagePullPolicy: Always
  maxPlayers: 13
  randomLetterScoreMode: "true"
  gameDuration: 30
  quickBonusSeconds: 10
  uniqueWordBonus: 1
  rackSize: 8
  minVowels: 2
  minConsonants: 2
  logLevel: debug
  defaultLanguage: en
  chatHistorySize: 50
  totalTiles: 100
  kofiId: "wordwonk"
  kofiEnabled: false
  paypalEnabled: false
  paypalEmail: "quinnfazigu@gmail.com"
  projectCodeLink: "https://github.com/ronstr8/wordwonk"
  scoreAgainstAI: "true"
  endOnAllPlayed: "true"
  storageClass: "wordwank-db-local"
  persistence:
    manualPV: true


# Centralized Ingress configuration
ingress:
  enabled: true
  host: wordwonk.fazigu.org
  annotations:
    kubernetes.io/ingress.class: nginx
    # Cert-manager will automatically provision SSL certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Redirect HTTP to HTTPS
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  tls:
    enabled: true
    secretName: wordwonk-tls

# Subchart overrides
frontend:
  enabled: true
  service:
    type: ClusterIP
    port: 80

wordd:
  enabled: true
  service:
    type: ClusterIP
    port: 2345
  langs: "en,es,fr,de,ru"

backend:
  enabled: true
  image:
    tag: "latest"
  service:
    port: 3000
  ollama:
    url: "http://ollama:11434"
    model: "phi3:mini"
  database:
    url: "dbi:Pg:dbname=wordwank;host=postgresql"
    user: "wordwank_backend"
  env:
    ADMIN_SMS_EMAIL: "17169032417@tmomail.net"
    CHAT_HISTORY_SIZE: 50
    OLLAMA_URL: "http://ollama:11434"
    OLLAMA_MODEL: "phi3:mini"

# PostgreSQL dependency configuration
postgresql:
  enabled: true
  fullnameOverride: postgresql
  image:
    tag: "latest"
  auth:
    database: "wordwank"
    username: "wordwank_backend"
  primary:
    initdb:
      scriptsConfigMap: db-init
    persistence:
      enabled: true
      size: 10Gi
  volumePermissions:
    enabled: true
    image:
      repository: busybox
      tag: latest

ollama:
  enabled: true
  image:
    repository: localhost:5000/wordwonk-ollama
    tag: latest
  service:
    type: ClusterIP
    port: 11434
  resources:
    limits:
      cpu: "4"
      memory: "4Gi"
    requests:
      cpu: "2"
      memory: "2Gi"
