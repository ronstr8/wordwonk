apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      containers:
        - name: ollama
          image: "{{ .Values.global.registry }}/{{ .Values.global.projectName | default "wordwonk" }}-ollama:{{ .Values.ollama.imageTag | default .Values.global.imageTag | default .Chart.AppVersion }}"
          ports:
            - containerPort: 11434
          resources:
            {{- toYaml .Values.ollama.resources | nindent 12 }}
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 10
# Models are now baked into the custom image at srv/ollama/Dockerfile
---
apiVersion: v1
kind: Service
metadata:
  name: ollama
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    app: ollama
  ports:
    - protocol: TCP
      port: 11434
      targetPort: 11434
  type: {{ .Values.ollama.service.type }}
