apiVersion: v1
kind: ConfigMap
metadata:
  name: db-init
  namespace: {{ .Values.global.namespace | default "wordwonk" }}
data:
  01-bootstrap.sql: |
    -- Wordwonk PostgreSQL Schema
    -- Enable UUID extension
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- Players
    CREATE TABLE IF NOT EXISTS players (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        nickname TEXT UNIQUE,
        real_name TEXT,
        email TEXT UNIQUE,
        language TEXT NOT NULL DEFAULT 'en',
        lifetime_score INTEGER NOT NULL DEFAULT 0,
        brain JSONB,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        last_login_at TIMESTAMP WITH TIME ZONE
    );

    -- Seed initial AI data if they don't exist
    INSERT INTO players (id, nickname, brain) VALUES
    ('00000000-0000-4000-a000-000000000001', 'Yertyl', '{"schedule": {"mon": ["00:00-08:00"], "tue": ["00:00-08:00"], "wed": ["00:00-08:00"], "thu": ["00:00-08:00"], "fri": ["00:00-08:00"], "sat": ["00:00-08:00"], "sun": ["00:00-08:00"]}, "character_prompt": "You are Yertyl, a slow, thoughtful, and slightly grumpy turtle who hates being rushed. You speak in short, punchy sentences and occasionally complain about the speed of younger ’wonks’.", "wait_seconds_base": 15, "rnd_word_count": 3, "min_score_to_play": 1, "min_score_to_win": 40}')
    ON CONFLICT (id) DO UPDATE SET brain = EXCLUDED.brain;

    INSERT INTO players (id, nickname, brain) VALUES
    ('00000000-0000-4000-a000-000000000002', 'Flash', '{"schedule": {"mon": ["16:00-23:59"], "tue": ["16:00-23:59"], "wed": ["16:00-23:59"], "thu": ["16:00-23:59"], "fri": ["16:00-23:59"], "sat": ["16:00-23:59"], "sun": ["16:00-23:59"]}, "character_prompt": "You are Flash, a hyper-active, caffeine-fueled speedster who talks too fast and thinks everyone else is too slow. Use lots of exclamation marks and energetic words.", "wait_seconds_base": 5, "rnd_word_count": 5, "min_score_to_play": 5, "min_score_to_win": 35}')
    ON CONFLICT (id) DO UPDATE SET brain = EXCLUDED.brain;

    INSERT INTO players (id, nickname, brain) VALUES
    ('00000000-0000-4000-a000-000000000003', 'Wonko', '{"schedule": {}, "probability": 0.2, "character_prompt": "You are Wonko, a self-proclaimed ’wonk master’ who is overly confident and uses too many puns about ’wonking words’. You think you are the best at this game.", "wait_seconds_base": 8, "rnd_word_count": 8, "min_score_to_play": 10, "min_score_to_win": 25}')
    ON CONFLICT (id) DO UPDATE SET brain = EXCLUDED.brain;

    INSERT INTO players (id, nickname, brain) VALUES
    ('00000000-0000-4000-a000-000000000004', 'Scrabbler', '{"schedule": {"all": ["08:00-16:00"]}, "character_prompt": "You are Scrabbler, a serious, competitive linguist who thinks Wordwonk is beneath them but plays it anyway. Use sophisticated vocabulary and sound slightly superior.", "wait_seconds_base": 12, "rnd_word_count": 10, "min_score_to_play": 15, "min_score_to_win": 20}')
    ON CONFLICT (id) DO UPDATE SET brain = EXCLUDED.brain;

    -- Linked Identitites (OAuth providers)
    CREATE TABLE IF NOT EXISTS player_identities (
        id BIGSERIAL PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        provider TEXT NOT NULL,
        provider_id TEXT NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        UNIQUE(provider, provider_id)
    );

    -- Passkey Credentials (WebAuthn)
    CREATE TABLE IF NOT EXISTS player_passkeys (
        id BIGSERIAL PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        credential_id BYTEA UNIQUE NOT NULL,
        public_key BYTEA NOT NULL,
        sign_count BIGINT DEFAULT 0,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Stateful Sessions
    CREATE TABLE IF NOT EXISTS sessions (
        id TEXT PRIMARY KEY,
        player_id UUID NOT NULL REFERENCES players(id) ON DELETE CASCADE,
        expires_at TIMESTAMP WITH TIME ZONE NOT NULL,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW()
    );

    -- Games (individual rounds)
    CREATE TABLE IF NOT EXISTS games (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        rack TEXT[] NOT NULL,
        letter_values JSONB NOT NULL,
        language TEXT NOT NULL DEFAULT 'en',
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        started_at TIMESTAMP WITH TIME ZONE,
        finished_at TIMESTAMP WITH TIME ZONE
    );

    -- Plays (entries made during a game)
    CREATE TABLE IF NOT EXISTS plays (
        id BIGSERIAL PRIMARY KEY,
        game_id UUID NOT NULL,
        player_id UUID NOT NULL,
        word TEXT NOT NULL,
        score INTEGER NOT NULL,
        is_auto_submit BOOLEAN DEFAULT FALSE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT NOW(),
        CONSTRAINT fk_game FOREIGN KEY (game_id) REFERENCES games(id) ON DELETE CASCADE,
        CONSTRAINT fk_player FOREIGN KEY (player_id) REFERENCES players(id) ON DELETE CASCADE
    );

    -- Indexing for speed
    CREATE INDEX IF NOT EXISTS idx_plays_game ON plays(game_id);
    CREATE INDEX IF NOT EXISTS idx_plays_player ON plays(player_id);
    CREATE INDEX IF NOT EXISTS idx_sessions_expiry ON sessions(expires_at);
